<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis Drill Book — Life OS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --ink:#E9E7E1; --ink-secondary:#888D9B; --ink-tertiary:#5A5F6C;
    --paper:#15171F; --paper-raised:#1C1F28; --paper-sunken:#242833;
    --rule:#30343F; --rule-strong:#3d4250;
    --accent:#58C9A3; --accent-light:rgba(88,201,163,.12);
    --amber:#E0A455; --amber-light:rgba(224,164,85,.12);
    --red:#E5654B; --red-light:rgba(229,101,75,.12);
    --purple:#B584D9; --purple-light:rgba(181,132,217,.12);
    --radius:6px; --radius-lg:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink)}
  body{font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;padding:26px 16px 60px}
  h1,.title,.eyebrow,.mb-title,.item-section,.tally-lbl,.stat-lbl{font-family:"Space Grotesk","Hanken Grotesk",sans-serif}
  .mono,.spread-number,.item-id,.progress-pill,.tally-num,.stat-num,.selfcheck{font-family:"JetBrains Mono",monospace}

  #app{max-width:820px;margin:0 auto}

  .backlink{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-secondary);text-decoration:none;border:1px solid var(--rule);border-radius:20px;padding:3px 10px;margin-bottom:16px}
  .backlink:hover{color:var(--ink);border-color:var(--rule-strong)}
  .backlink-float{display:none}
  @media(max-width:680px){
    .backlink-float{display:inline-block;position:fixed;top:10px;right:10px;z-index:50;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink);text-decoration:none;background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:20px;padding:5px 12px}
  }

  .eyebrow{font-family:"Space Grotesk";font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-secondary)}
  h1.title{font-weight:700;font-size:28px;line-height:1.15;margin:6px 0 4px;letter-spacing:-0.01em}
  .subtitle{font-size:13px;color:var(--ink-secondary);margin:0 0 24px;max-width:60ch}

  .card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:14px}

  .spread-hero{padding:22px 22px 18px}
  .spread-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .spread-number{font-size:40px;font-weight:600;color:var(--ink);letter-spacing:-0.02em}
  .spread-unit{font-size:18px;color:var(--ink-secondary);font-weight:400;margin-left:2px}
  .spread-label{font-size:12px;color:var(--ink-secondary);max-width:24ch;text-align:right}
  .spread-track{position:relative;height:8px;border-radius:6px;margin-top:14px;background:linear-gradient(90deg,var(--accent) 0%,var(--amber) 50%,var(--red) 100%);opacity:.9}
  .spread-marker{position:absolute;top:-4px;width:2px;height:16px;background:var(--ink);border-radius:1px;transform:translateX(-1px)}
  .spread-ticks{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--ink-tertiary)}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
  .stat-cell{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 8px;text-align:center}
  .stat-num{font-size:19px;font-weight:600}
  .stat-lbl{font-size:10px;color:var(--ink-secondary);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

  h2.section-h{font-family:"Space Grotesk";font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-secondary);margin:24px 0 10px;display:flex;align-items:center;gap:10px}
  h2.section-h::after{content:'';flex:1;height:1px;background:var(--rule)}

  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mode-btn{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:var(--radius);padding:14px;text-align:left;color:var(--ink);cursor:pointer;font-family:"Hanken Grotesk"}
  .mode-btn:hover{border-color:var(--amber)}
  .mode-btn .mb-title{font-weight:600;font-size:14px;margin-bottom:3px}
  .mode-btn .mb-sub{font-size:11.5px;color:var(--ink-secondary)}

  select.section-select{width:100%;background:var(--paper-sunken);color:var(--ink);border:1px solid var(--rule);border-radius:var(--radius);padding:11px 12px;font-family:"Hanken Grotesk";font-size:14px;margin-bottom:10px}
  .full-btn{width:100%;background:var(--paper-sunken);border:1px solid var(--rule);border-radius:var(--radius);padding:12px 14px;color:var(--ink);font-family:"Space Grotesk";font-size:13.5px;font-weight:600;cursor:pointer;text-align:center}
  .full-btn:hover{border-color:var(--amber)}

  details.patterns summary{cursor:pointer;font-family:"JetBrains Mono";font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--amber);list-style:none}
  details.patterns summary::-webkit-details-marker{display:none}
  details.patterns[open] summary{margin-bottom:10px}
  .pattern-item{font-size:12.5px;color:var(--ink-secondary);margin:8px 0;padding-left:14px;border-left:2px solid var(--rule)}
  .pattern-item b{color:var(--ink)}

  .sync-note{text-align:center;font-size:10.5px;color:var(--ink-tertiary);margin-top:4px}
  .reset-link{display:block;text-align:center;margin-top:22px;font-size:11px;color:var(--ink-tertiary);background:none;border:none;cursor:pointer;font-family:"Hanken Grotesk";text-decoration:underline;text-underline-offset:3px}

  .drill-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .progress-pill{font-size:11px;color:var(--ink-secondary)}
  .end-link{font-size:11px;color:var(--ink-secondary);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:"Hanken Grotesk"}

  .qcard{padding:24px 24px 22px}
  .qcard .item-id{font-size:10.5px;color:var(--amber);letter-spacing:.04em}
  .qcard .item-section{font-size:10.5px;color:var(--ink-secondary);letter-spacing:.04em;text-transform:uppercase;margin-left:10px}
  .qtext{font-family:"Space Grotesk";font-weight:500;font-size:18px;line-height:1.4;margin:12px 0 14px}
  .risk-box{background:var(--paper-sunken);border-left:3px solid var(--amber);border-radius:var(--radius);padding:10px 14px;font-size:12.5px;color:var(--ink-secondary);margin-bottom:16px}
  .risk-box b{color:var(--amber);font-weight:600}

  .answer-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-secondary);margin-bottom:6px}
  textarea.answer-input{width:100%;min-height:120px;background:var(--paper-sunken);border:1px solid var(--rule);border-radius:var(--radius);padding:11px 13px;color:var(--ink);font-family:"Hanken Grotesk";font-size:13.5px;line-height:1.55;resize:vertical}
  textarea.answer-input:focus{outline:none;border-color:var(--amber)}
  .answer-actions{display:flex;gap:10px;margin-top:12px;align-items:center}
  .skip-link{background:none;border:none;cursor:pointer;font-family:"Hanken Grotesk";font-size:12px;color:var(--ink-secondary);text-decoration:underline;text-underline-offset:3px;white-space:nowrap}

  .grading-indicator{display:flex;align-items:center;gap:10px;padding:14px;color:var(--ink-secondary);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase}
  .grading-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}

  .verdict-box{border-radius:var(--radius);padding:13px 15px;margin-bottom:14px;border-left:3px solid var(--amber);background:var(--paper-sunken)}
  .verdict-box.tier-nailed{border-left-color:var(--accent)}
  .verdict-box.tier-shaky{border-left-color:var(--amber)}
  .verdict-box.tier-blanked{border-left-color:var(--red)}
  .verdict-headline{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
  .verdict-box.tier-nailed .verdict-headline{color:var(--accent)}
  .verdict-box.tier-shaky .verdict-headline{color:var(--amber)}
  .verdict-box.tier-blanked .verdict-headline{color:var(--red)}
  .verdict-feedback{font-size:13px;line-height:1.6;color:var(--ink)}
  .your-answer-box{font-size:12px;color:var(--ink-secondary);font-style:italic;padding:10px 14px;background:var(--paper-sunken);border-radius:var(--radius);margin-bottom:14px;border:1px solid var(--rule)}
  .your-answer-box .ya-label{font-family:"JetBrains Mono";font-style:normal;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-secondary);display:block;margin-bottom:4px}

  .answer-block p{font-size:13.5px;line-height:1.65;margin:0 0 12px}
  .answer-block ul{margin:0 0 12px;padding-left:20px}
  .answer-block li{font-size:13.5px;line-height:1.6;margin-bottom:8px}
  .answer-block em{color:var(--amber);font-style:italic}
  .answer-block strong{color:var(--ink)}

  .note-box{background:var(--paper-sunken);border:1px dashed var(--rule);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--ink-secondary);margin:10px 0}
  .note-box::before{content:'MARGIN NOTE';display:block;font-family:"JetBrains Mono";font-size:9px;letter-spacing:.08em;color:var(--amber);margin-bottom:5px}

  .selfcheck{margin:16px 0;padding:11px 13px;background:var(--paper-sunken);border-radius:var(--radius);font-size:11px;color:var(--ink-secondary);line-height:1.7}
  .selfcheck b{color:var(--amber)}

  .stamp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
  .stamp{border-radius:var(--radius);padding:13px 6px;text-align:center;font-family:"JetBrains Mono";font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;cursor:pointer;border:1.5px solid;background:transparent}
  .stamp.blanked{color:var(--red);border-color:var(--red)}
  .stamp.blanked:hover{background:var(--red-light)}
  .stamp.shaky{color:var(--amber);border-color:var(--amber)}
  .stamp.shaky:hover{background:var(--amber-light)}
  .stamp.nailed{color:var(--accent);border-color:var(--accent)}
  .stamp.nailed:hover{background:var(--accent-light)}
  .stamp.ai-suggested{box-shadow:0 0 0 2px currentColor}

  .summary-tally{display:flex;gap:10px;margin:16px 0}
  .tally-cell{flex:1;text-align:center;padding:15px 8px;border-radius:var(--radius);background:var(--paper-sunken);border:1px solid var(--rule)}
  .tally-num{font-size:24px;font-weight:700}
  .tally-lbl{font-size:10px;color:var(--ink-secondary);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

  button:focus-visible,select:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  button{font:inherit}

  @media(max-width:480px){
    .mode-grid{grid-template-columns:1fr}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .qtext{font-size:16.5px}
  }
</style>

<div id="app"></div>
<script>
window.ITEMS = [
  {
    "id": "Q33",
    "section": "Research Questions",
    "q": "Your two research questions — the EF premium's role in bank lending, and whether that extends to near-banks — are addressed in one thesis rather than as two separate papers. What's the actual argument for why they belong together, and are they equally falsifiable?",
    "risk": "\"we had the data so we looked at it too\" is a weak justification for pairing two research questions in one thesis — an examiner could reasonably ask why RQ2 isn't just a suggestion for future research instead of a full second research question.",
    "notes": [],
    "answer": "They belong together because RQ2 is a direct theoretical implication of RQ1, not an independent add-on. If the operative mechanism is the cost of external funding rather than deposit quantity, then any institution facing a market-priced cost of external funds — chartered bank or not — is subject to that mechanism. Testing whether this actually extends to non-bank, wholesale-funded intermediaries is the natural and necessary next step once RQ1's reconceptualization is established, not a convenient use of an available dataset.\n\nThey are not equally falsifiable, though, and it's worth being explicit about that distinction rather than treating both results as the same kind of finding. RQ1 got a genuinely decisive test: EF could have come out insignificant or wrong-signed in the bank panel, and it didn't — total and NFC lending both confirm it cleanly under the preferred estimator. RQ2's test, as implemented, isn't decisive either way — the result is \"inconclusive due to data frequency,\" a different kind of outcome from a clean rejection. That's not a flaw in the underlying research question — near-bank transmission is just as real and interesting a question as bank transmission in principle — it's a statement about this specific test's power, given annual data on a heterogeneous set of ~30 institutions. Say plainly if pushed: RQ1's test was decisive in the sense that it could have failed and didn't; RQ2's test, as implemented here, doesn't have the power to be decisive in either direction."
  },
  {
    "id": "Q1",
    "section": "Literature & Contribution",
    "q": "You claim to be the first to model the EF premium via CDS spreads in a Swedish panel, and the first to examine BLC transmission in Swedish near-banks. How confident are you that nobody else has done this?",
    "risk": "priority claims are the cheapest thing in the room to attack — it only takes the examiner naming one paper.",
    "notes": [
      "Action item: do one more literature pass before 19 August specifically checking for anything 2024–2026 that might pre-empt either claim."
    ],
    "answer": "The claim is scoped narrowly and defensibly — *directly via CDS spreads*, *in a Swedish panel*, and *near-bank intermediaries in this institutional setting* specifically. Related work exists (Gambacorta & Shin 2018 on capitalisation and funding costs; Buchak et al. 2024 on non-bank substitution; Li & Myers 2025 on the Swedish non-bank sector) but none combine a direct CDS-based cost proxy with the Swedish bank panel, or extend BLC identification to Swedish near-banks specifically. State the scope precisely rather than the claim broadly, and the \"first\" holds."
  },
  {
    "id": "Q2",
    "section": "Literature & Contribution",
    "q": "Buchak et al. (2024) show non-bank substitution significantly shapes how capital regulation affects lending — you cite them to justify studying near-banks. But your own near-bank results are inconclusive on transmission. Doesn't that undercut your own motivation?",
    "risk": "this is a real tension, not a dodge-able one. You're using a paper with a strong positive finding to motivate an exercise that itself comes back null on the headline variable.",
    "notes": [],
    "answer": "Buchak et al. motivate *why non-banks matter for transmission in general* — they don't claim every institutional setting or every channel will show a clean result, and the paper doesn't need to replicate their finding to justify the exercise. The contribution here is narrower and still stands: this is the first attempt to bring Swedish near-banks into the BLC identification at all. The null on policy rate is a data-frequency limitation (annual, not quarterly), explicitly flagged as inconclusive rather than as evidence against the Buchak et al. logic. What *does* corroborate the broader \"non-banks matter\" case is that risk and liquidity are significant determinants of near-bank lending response — the institutions respond to shocks, just not measurably to the policy rate itself at this frequency."
  },
  {
    "id": "Q3",
    "section": "Literature & Contribution",
    "q": "Your motivation section says studying Sweden \"provides further country experience.\" Isn't that a fairly weak justification — why should anyone care about one more country?",
    "risk": "\"more country data\" is a weak standalone motivation and examiners know it.",
    "notes": [],
    "answer": "Agree, and don't lead with that framing live. The stronger, sharper version of the motivation — and the one to lead with in the room — is the institutional argument: Sweden abolished reserve requirements in 1994 and has a low deposit-to-liabilities ratio (~35%), which makes it a particularly *clean* test case for ruling out the deposit-based channel and isolating a cost-based mechanism. That's not \"another data point,\" it's a setting chosen because its institutional features sharpen identification. Use that framing; \"further country experience\" is scene-setting text, not the actual argument."
  },
  {
    "id": "Q4",
    "section": "Economic Theory",
    "q": "The classical bank lending channel operates through deposits. The balance sheet channel operates through borrower net worth. Can these really be operating at the same time, and if so, how do you know which one you're identifying?",
    "risk": null,
    "notes": [],
    "answer": "Yes, they're not mutually exclusive — they sit at different loci (lender balance sheet vs. borrower balance sheet) and can reinforce each other. The identification strategy addresses this by using bank-specific characteristics under the standard assumption that loan *demand* is largely macro-driven and independent of bank characteristics, which isolates the supply-side (bank lending channel) response from demand-side (balance sheet channel) effects."
  },
  {
    "id": "Q5",
    "section": "Economic Theory",
    "q": "Under Disyatat's reconceptualisation, size and liquidity are reinterpreted as proxies for EF-premium sensitivity rather than deposit-substitution capacity. Isn't that just a relabeling exercise — how would results actually look different under the old vs. new interpretation?",
    "risk": null,
    "notes": [],
    "answer": "The distinguishing evidence is that size and liquidity remain significant *even after the direct EF premium (CDS spread) is controlled for*. Under the old (deposit-substitution) interpretation, once you control for the actual cost of external funds, these characteristics should lose explanatory power — they were only proxying access to alternative funding. They don't lose power; they retain independent significance. That's the evidence that they're capturing something about *sensitivity to* the EF premium (heterogeneous pass-through) rather than *capacity to avoid* it."
  },
  {
    "id": "Q22",
    "section": "Economic Theory",
    "q": "Bank characteristics (size, liquidity, capitalisation, risk) are described as proxies for a bank's conditional probability of default, while the CDS-based EF variable measures that same default probability's realised market cost directly. If CDS already prices what the bank characteristics proxy, why include both — isn't that double-counting the same underlying thing?",
    "risk": "this looks like a genuine specification problem at first glance — two sets of variables apparently representing the same underlying construct, included together in the same regression. An examiner could use this to probe whether the model is properly specified or just kitchen-sinking controls.",
    "notes": [
      "This is the same point Q5 already makes — size and liquidity capture \"sensitivity to the EF premium (heterogeneous pass-through) rather than capacity to avoid it.\" The word \"sensitivity\" is doing real technical work here: it's pointing specifically at the interaction terms in the regression table, not just softening the claim."
    ],
    "answer": "They aren't double-counting, because of how each variable actually enters the regression, not just what it conceptually represents. The EF/CDS term enters as a level — it measures the funding cost a bank faces right now, full stop. Size, liquidity, and capitalisation enter twice: as level terms, but also as interaction terms with the policy rate change (Δi × size, Δi × LIQ, etc.). That interaction structure measures something CDS structurally cannot: how much a bank's lending response to a policy shock varies with its size or liquidity — sensitivity, not level. A bank can have an unremarkable current CDS spread and still show a large interaction coefficient, because the interaction term captures responsiveness to a shock, not the current price of funding. These are two different statistical objects answering two different questions — \"what does this bank pay right now\" versus \"how sharply does this bank's behaviour move when the rate moves\" — which is exactly why size and liquidity remain significant even after CDS is controlled for directly (Section 5.1), rather than losing significance the way funding composition does."
  },
  {
    "id": "Q23",
    "section": "Economic Theory",
    "q": "Disyatat (2010a) identifies two amplification mechanisms — one through the link between monetary policy and risk perceptions, one through the direct effect of policy on intermediary balance sheets — both propagating through the EF premium. What's the actual difference between these two, and give me a concrete example of each?",
    "risk": "it's easy to restate the two definitions in slightly different words without actually instantiating them — an examiner asking for \"concrete examples\" wants the theory applied to an actual scenario, not paraphrased back.",
    "notes": [
      "Caveat: this is reconstructed from the standard financial-accelerator/risk-taking-channel literature the thesis already cites (Borio & Zhu; Adrian & Shin), not a direct quote of Disyatat's (2010a) own wording. Worth a five-minute check against the actual paper before the defence, since it's the most-cited source in the thesis — there should be zero daylight between what's said in the room and what the paper actually argues."
    ],
    "answer": "The two mechanisms run on different clocks. The risk-perception mechanism is forward-looking and expectational — it moves before any real damage exists. A policy rate hike leads wholesale investors to immediately reassess a bank's default probability, because the bank's borrowers now face higher debt-servicing costs (concretely for Sweden, most household mortgages are variable-rate and STIBOR-indexed) — so expected future defaults rise and CDS spreads widen the same day the hike is priced in, before any loan has actually gone bad. The balance-sheet mechanism is mechanical and realized — actual damage, not a reassessment. The same hike reduces the mark-to-market value of the bank's existing fixed-rate bond holdings, and as loans genuinely default over subsequent quarters, loan-loss provisions eat directly into capital — leverage mechanically rises (same debt, less equity), raising the bank's true probability of default because the loss-absorbing buffer is now physically smaller.\n\nThe crisp version: one is the market repricing risk before it happens; the other is the balance sheet actually absorbing the damage once it does. Both raise the EF premium, but on a different timeline — one instant, one lagged."
  },
  {
    "id": "Q24",
    "section": "Economic Theory",
    "q": "Romer & Romer (1990) conclude that greater access to external funding weakens the bank lending channel. The paper argues Disyatat's framework reverses this — external funding access can strengthen the channel instead. Same institutional fact, opposite conclusions — what is Romer & Romer missing?",
    "risk": "it's easy to gesture at \"the deposit view vs. the cost view\" in general terms without landing the specific mechanical reason why external funding reliance flips from an escape hatch into the very thing that transmits the shock.",
    "notes": [
      "Framing note: Romer & Romer made a genuine contribution establishing that structural developments were eroding the deposit-based channel — they simply hadn't yet reconceived what the channel actually ran on. Later work (Bernanke 2007; Disyatat 2010a) built on that observation rather than correcting a mistake. Worth defaulting to this more charitable framing generally when discussing literature that predates a later reconceptualization — it reads as rigorous rather than dismissive, and is also just the more accurate description of how the literature actually progressed."
    ],
    "answer": "Romer & Romer's inference was logically sound given the model standard at the time — the flaw is in the deposit-quantity assumption, not a failure to understand banking. Under that assumption, external funding access lets banks dodge the channel: if deposits drain, a bank can just tap wholesale markets, so more external-funding access means the deposit-drain mechanism bites less. That's a coherent conclusion under a deposit-based model.\n\nThe reversal follows once the operative mechanism is cost rather than quantity. External funding reliance is literally the share of a bank's liabilities exposed to repricing when the EF premium moves — a bank funded 80% via wholesale has 80% of its funding cost jump when the premium rises; a bank funded 20% via wholesale has only 20% exposed. Under the deposit view, external access was an escape hatch that let a bank dodge the channel entirely; under the cost view, external access *is* the substrate the channel runs through — more of it means more of the balance sheet exposed to the very thing that transmits policy. Same institutional fact (heavier reliance on external funding), opposite implication, because the underlying model of what the channel actually operates through changed."
  },
  {
    "id": "Q14",
    "section": "Economic Theory",
    "q": "You open by invoking the monetarist/Keynesian debate about how money supply affects the economy, then argue Sweden's abolition of reserve requirements makes it a clean testing environment. But modern central banks don't set policy by varying the money supply at all — they target a rate directly, and most money is created endogenously by commercial banks issuing loans. Doesn't your own opening framing describe a mechanism that doesn't actually operate anymore?",
    "risk": "an examiner fluent in monetary operations could read the opening paragraph as implying central banks still work via money-supply targeting, and use that to suggest the framing is dated or the institutional argument is shakier than it looks.",
    "notes": [
      "Have the price-setter/quantity-taker distinction ready verbatim — it's a fast, confident answer to what could otherwise sound like a gotcha."
    ],

    "answer": "It's neither — and that's the answer to give, not a hedge. Both the Keynesian interest-rate model and the monetarist broad-substitution model implicitly treated credit as frictionless: once you knew the risk-free rate (Keynesians) or the money stock (monetarists), nothing about *who* supplied a loan or on what terms mattered independently. The bank lending channel exists because informational frictions between lenders and wholesale investors make a bank's own funding cost an independent driver of lending, over and above either of those variables. The EF premium is a market-priced measure of exactly that friction — a third kind of variable neither original camp had room for, not a refinement of either one.\n\n- If this result had existed at the time, it would have partly vindicated the monetarist complaint that interest-rate-only models miss something real — investment and lending were never fully explained by the rate alone — but for a different reason than monetarists gave. The missing piece wasn't broad asset substitution across the whole economy; it was a narrow, institution-specific credit-market friction.\n\n- The more honest counterfactual: the debate probably couldn't have been resolved this way at the time regardless. CDS markets, Sweden's 1994 reserve-requirement abolition, and the panel-GMM methods used here all postdate the 1960s debate by decades. The theoretical possibility of credit-market frictions was available earlier (Akerlof, Stiglitz, developing through the 1970s), but the empirical demonstration had to wait for the data and estimators to catch up. The debate stalled less for lack of theory than for lack of measurement."

    ],
    "answer": "Two theories, not three, connected by one empirical finding whose meaning changed over time.\n\n**Theory 1 — deposit-constrained** (Bernanke & Blinder, 1988): reserve requirements bind, deposits are the loanable-funds constraint, a rate rise drains deposits and mechanically contracts credit.\n\n**The bridging finding, not a third theory:** Kashyap & Stein (1995, 2000) showed banks respond heterogeneously to the same policy shock — large, liquid, well-capitalised banks tap wholesale markets to offset deposit outflows, so the effect concentrates in small, illiquid banks. At the time, this was read *within* Theory 1: size, liquidity, and capitalisation were proxies for a bank's *capacity to substitute away from* a shrinking deposit base. Still fundamentally a deposit-quantity story — just showing the constraint doesn't bind uniformly.\n\n**Theory 2 — cost-constrained** (Bernanke, 2007; Disyatat, 2010a): the *same* bank-characteristic evidence gets reinterpreted, not re-derived from new data. Two separate developments made the reinterpretation both necessary and plausible: institutional change (reserve requirements abolished in many countries, including Sweden in 1994; central banks stopped operating via scarce-reserves OMO and became price-setters/quantity-takers instead) explains why the constraint *stopped binding*; and, as a distinct point about causality rather than institutional change, loan creation was always the process that generates deposits, not the reverse — so deposits were never really the independent driver of lending even before anything changed institutionally. Under Theory 2, size/liquidity/capitalisation stop proxying *capacity to access* wholesale funding and start proxying *sensitivity to the cost* of that funding. Deposits have very little to do with the mechanism at this stage, mechanically.\n\n**This paper's contribution sits at the point where Theory 2 finally becomes directly measurable rather than only inferable.** Prior cost-view literature (Damar et al., 2015; Brinkmeyer, 2014) still only had indirect proxies for the cost mechanism — funding composition (the wholesale share of a bank's liabilities) stood in for cost, since no one had modelled the cost itself. This paper constructs an *observable*, market-priced measure of the EF premium directly, via CDS spreads plus STIBOR. Once that direct measure sits in the regression alongside the bank-characteristic control vector, two things happen together: bank characteristics remain significant, confirming they capture *sensitivity* to the EF premium via their interaction terms rather than *capacity to offset* deposit shortfalls (Q22); and funding composition loses significance.\n\nThe precise way to state what that second result means: composition wasn't unimportant before this paper — Damar et al. and Brinkmeyer were picking up something real. Composition's earlier significance reflected its role as an imperfect *proxy* for the EF premium, not an independent channel of its own. Once the direct measure is available, composition has nothing left to explain — not because it was never meaningful, but because what it was capturing is now observed directly. This is *consistent with* that interpretation, not a formally tested mediation result (no first-stage regression of composition on CDS is presented) — say \"is consistent with,\" not \"this clears it up,\" for the same reason \"directly tests\" needs to stay \"consistent with\" elsewhere in this document."

    "answer": "The money multiplier sits alongside IS-LM pedagogically, but does a different job. IS-LM takes the money supply as a given and asks what it does to output via the interest rate; the multiplier is the separate piece of plumbing explaining how the central bank supposedly controls that money supply in the first place — it sets the monetary base, a stable reserve ratio scales that into deposits, and the money stock falls out mechanically. Textbooks present the multiplier first because IS-LM's money-supply assumption silently depends on it being true.\n\nRelative to the bank lending channel, the relationship is closer than \"alongside\" — the classical bank lending channel (Bernanke & Blinder, 1988) *is* the multiplier, aimed at a narrower target: instead of asking how a reserve change affects aggregate money, it asks how a reserve change affects bank lending specifically, since deposits are a component of the money stock and are reserve-constrained. Same mechanical chain, narrower dependent variable — which is exactly why it failed for the same reason the multiplier is a poor description of modern banking: once large banks can tap wholesale markets, or reserve requirements are abolished entirely, the constraint the multiplier depends on doesn't bind, for the money stock or for bank lending.\n\nThe correction that matters: the reserve ratio is not the kind of friction the credit channel is built on. It's a uniform, mechanical, regulatory constraint — the same for every bank regardless of quality or risk — with nothing to do with information. The credit-channel friction is informational asymmetry, priced heterogeneously by market participants, that makes external finance costlier than internal finance for some borrowers/lenders more than others. The money multiplier doesn't acknowledge that friction at all; it shares the same frictionless-credit assumption IS-LM and the monetarist view share (see Q15) — it just bolts one extra institutional rule (the reserve ratio) onto an otherwise frictionless world where any bank with excess reserves can costlessly convert them into loans, no questions asked about who's borrowing.\n\nThis is precisely why Sweden abolishing reserve requirements in 1994 doesn't kill the bank lending channel — it only kills the multiplier's version of it. The version this paper tests runs on a genuinely different kind of friction (market-priced credit risk), unrelated to reserve accounting, and therefore survives fully intact in a setting with zero reserve requirements. This is arguably the cleanest single sentence for why Sweden works as a testing ground: reserve-requirement abolition removes the one thing that would make the classical and reconceived channels look alike, leaving only the real friction standing."

      "So what does the fix actually change? Two things, and they cut in your favor. First, internal consistency: read literally, the original sentence could imply household has three stacking diagnostic problems — Sargan fails, second-order correlation is present, and first-order is unclear — which directly contradicts the \"exactly one precisely-located problem\" framing used everywhere else in this doc (Q7, Q8, Q9). If an examiner reads the sentence the literal way and then hears you say \"it's just the Sargan failure\" elsewhere, that's a live self-contradiction they could pull on. Second, and more important: the corrected version doesn't just remove ambiguity, it changes which claim the thesis makes — from \"possibly three things wrong\" to \"one specific, nameable thing wrong\" (invalid instruments per Sargan). That's a stronger, more defensible position, not a weaker one; a single precisely diagnosed issue is easier to stand behind than an unexplained cluster. Third, the added clause about AR(1) is doing separate, quieter work: AR(1) not rejecting (p=0.173) could tempt you to treat it as reassuring, but AR(1) is structurally uninformative either way in a first-differenced GMM setup, since differencing mechanically induces first-order correlation in the transformed errors regardless of the true data-generating process (Q28's refresher entry). The fix is careful not to lean on AR(1) as supporting evidence — same discipline as \"consistent with\" versus \"directly tests\" elsewhere in this document: say only what a diagnostic actually licenses you to say."

    "answer": "Only one diagnostic actually fails for household — Sargan (p = 0.001). AR(2) = 0.164 does not reject the null at any conventional threshold, which is a clean pass, not a second failure. The original phrasing (\"the second order serial correlation test is also rejected... consistent with the requirements of the second assumption\") is genuinely ambiguous on a fast read — \"rejected\" there means the *possibility* of second-order correlation is rejected (the test found none), not that the diagnostic itself failed. Read alongside \"consistent with the requirements of the second assumption\" (no serial correlation, which is what's required), the intended meaning is that AR(2) passes.\n\nThe corrected, honest framing: household's problem is narrowly one diagnostic — invalid instruments per Sargan — not a compounding pair of failures. That's actually a cleaner story to tell than \"everything about household is shaky\": the instrument-validity concern is real and precisely located, and it's the only thing wrong with that specification's diagnostics."

    "risk": "citing \"Nickell bias\" without being able to explain *why* it happens is a common tell that a term has been memorized rather than understood.",
    "notes": [],
    "answer": "The fixed-effects (within) transformation removes each bank's own time-average from every variable, including the lagged dependent variable. The problem is that a bank's fixed effect is itself estimated from that same bank's average outcomes over the sample — so the demeaned lagged loan-growth term and the demeaned error term end up mechanically correlated, purely as an artefact of subtracting overlapping averages, not because of anything economically meaningful. Concretely: if a bank has an unusually bad, unmodeled shock in one quarter, that shock lowers both its average outcome over the whole sample (deflating its estimated fixed effect) and its lagged value in nearby periods — creating a spurious correlation between the lagged dependent variable and the error that has nothing to do with genuine persistence in lending. This bias doesn't vanish as the number of banks (N) grows — it only shrinks as the number of time periods (T) grows, which is exactly the problem here with N=8 banks and T≈24 quarters: T isn't remotely large enough for the bias to be negligible, which is precisely why FE/RE are inconsistent and why the paper moves to Anderson-Hsiao and Arellano-Bond instead."

    "answer": "\n\n**Equation (1)** is the main loan-supply regression for the quarterly bank panel. The dependent variable, Δln(loans), is loan growth for one of three segments (total, NFC, or household — the equation loops through all three). It's regressed on: its own lagged value (Δln(loans)ₜ₋₁, the term Nickell bias attaches to); the EF variable at levels, 0–1 lags; the FUNDING vector (equation 4) at levels, 0–1 lags; macro controls M at levels, 0–1 lags; the contemporaneous and lagged policy rate change (Δiₜ₋ₖ); interaction terms between the rate change and bank characteristics (Δiₜ₋ₖ × Xᵢ,ⱼ,ₜ₋₁); the bank characteristics themselves as levels (Xᵢ,ⱼ,ₜ₋₁); and time dummies D. This is the equation behind Table 3.\n\n**Equations (2) and (3)** are the demeaning transformations applied to the bank-characteristic variables before they enter equation (1) — covered in full in Q27: they centre each characteristic on the sample average (and, in equation 3, on the period average) so the interaction coefficients are directly interpretable as the policy effect for an average bank, and so the interaction terms sum to zero over the sample.\n\n**Equation (4)** defines the FUNDING vector: five separate terms — the contemporaneous and lagged change in wholesale funding, the lagged level of wholesale funding, and the contemporaneous and lagged change in retail funding. Both levels and changes appear because the paper wants to capture both a bank's funding *composition* at a point in time and how that composition is *shifting*, not just one or the other.\n\n**Equation (5)** is the reduced-form specification used for the near-bank sample (Table 4) — a simplified version of equation (1) that drops the FUNDING vector entirely (near-banks structurally lack a comparable retail funding base, so its absence is implied rather than modelled), adds a near-bank dummy (NB), and adds a Bonds vector capturing bond-market variables specific to that sample. Fewer moving parts than equation (1), reflecting the near-bank dataset's lower information content and different reporting structure.\n\n**Equation (6) does not appear in the text — worth knowing this rather than being surprised by it.** The numbering jumps from (5) to (7); this looks like a numbering artefact in the original document rather than a deliberately omitted equation. Worth a quick check against your own working files, but not something to construct an explanation for if it genuinely isn't there.\n\n**Equation (7)** is the vector-notation representation used specifically to derive Nickell bias: yᵢ,ₜ = λyᵢ,ₜ₋₁ + X'ᵢ,ₜ₋₁B + αᵢ + ηₜ + uᵢ,ₜ. A generic dynamic panel form — bank fixed effect αᵢ, time effect ηₜ, lagged dependent variable with coefficient λ — used purely to demonstrate algebraically why the within-transformation creates the correlation between the transformed lagged-Y term and the transformed error (Q28).\n\n**Equation (8)** is the Arellano-Bond first-differenced equation: (yᵢ,ₜ − yᵢ,ₜ₋₁) = λ(yᵢ,ₜ₋₁ − yᵢ,ₜ₋₂) + (X'ᵢ,ₜ₋₁ − X'ᵢ,ₜ₋₂)B + (uᵢ,ₜ − uᵢ,ₜ₋₁). First-differencing equation (7) eliminates the fixed effect αᵢ entirely (since it doesn't vary over time, differencing removes it), leaving a differenced lagged-Y term instrumented using deeper lagged levels (yᵢ,ₜ₋₂, yᵢ,ₜ₋₃, etc.) — the actual estimating equation behind the Arellano-Bond column in Table 3."

    "risk": "this is the natural \"walk me through your whole estimator choice\" question, and answering it well requires holding four things in your head at once rather than defending one at a time.",
    "notes": [],
    "answer": "\n\n**POLS (pooled OLS)** — pools all observations, ignoring bank-specific structure entirely. Pro: simplest, most efficient if its assumptions hold. Con: assumes no unobserved bank-specific heterogeneity at all, almost never credible with panel data — any persistent, unmodeled difference between banks ends up in the error term, correlated with the regressors, biasing every coefficient. Sensitivity: extremely vulnerable to omitted bank-level heterogeneity; the near-bank table's POLS/RE-vs-FE sign flip (Q35) is a direct demonstration of this going wrong.\n\n**RE (random effects)** — allows a bank-specific effect, but assumes it's uncorrelated with the regressors, and applies partial (\"quasi\") demeaning weighted by θ, keeping some between-bank variation POLS keeps entirely and FE discards entirely. Pro: more efficient than FE, since it doesn't throw away between-bank information. Con: the uncorrelated-effects assumption is \"heroic\" (the paper's own word) — implausible whenever bank characteristics like size or capitalisation are themselves correlated with unobserved bank quality, which they plausibly are here. Sensitivity: fails exactly where POLS fails, just less severely, since it relies on the same problematic assumption, only partially.\n\n**FE (fixed effects)** — demeans within each bank, removing any time-invariant bank-specific effect regardless of whether it's correlated with the regressors. Pro: robust to correlated bank effects, why it's preferred over POLS/RE whenever the Hausman test rejects RE. Con: introduces Nickell bias the moment a lagged dependent variable is on the right-hand side (Q28) — the within-transformation mechanically correlates the transformed lagged-Y term with the transformed error. Sensitivity: this bias shrinks only as T grows, not N — with T≈24 quarters here, it's not negligible.\n\n**Arellano-Bond (GMM)** — first-differences to eliminate the fixed effect entirely (equation 8), then instruments the differenced lagged dependent variable with deeper lagged levels, addressing Nickell bias directly rather than living with it. Pro: the only estimator here both robust to correlated bank effects and consistent with a lagged dependent variable present. Con: needs enough instruments to work, but not so many that they overwhelm a small N — with only 8 banks, instrument proliferation is a live risk (Q29), and its own diagnostics (Sargan, AR(2)) can fail, as they do for the household segment. Sensitivity: the most data-hungry and diagnostic-dependent of the four; when its own tests fail, the result is reported with that caveat rather than treated as fully trustworthy.\n\n**Why AB-GMM wins here specifically:** it's the only estimator addressing both problems this paper actually has — correlated bank effects (ruling out POLS and RE) and a lagged dependent variable (ruling out plain FE). And it's not just the theoretically \"correct\" choice — Q43 shows it's empirically load-bearing: FE and RE return a null on EF everywhere, and only AB-GMM reveals the significant effect. The preference isn't a methodological default; it's the estimator that makes the paper's central finding visible at all."

    "id": "Q58",
    "section": "Data & Identification",
    "q": "Equation (7) sets up the FE/RE specification with a lagged dependent variable. Walk through, using the equation's own notation, exactly why the within-transformation makes the lagged dependent variable correlated with the error — the actual algebra behind Nickell bias, not just the intuition.",
    "risk": "this is the \"can you actually derive it, not just recite the name\" version of Q28 — a natural deep-dive follow-up if an examiner wants to see the mechanism at the equation level rather than in words.",
    "notes": [],
    "answer": "Start from equation (7): yᵢ,ₜ = λyᵢ,ₜ₋₁ + X'ᵢ,ₜ₋₁B + αᵢ + ηₜ + uᵢ,ₜ. To remove the bank fixed effect αᵢ, the \"within\" transformation subtracts each bank's own time-average from every variable. Applied to the lagged dependent variable, this produces y*ᵢ,ₜ₋₁ = yᵢ,ₜ₋₁ − (1/(T−1))(yᵢ,₂+...+yᵢ,T), and the error becomes v*ᵢ,ₜ = vᵢ,ₜ − (1/(T−1))(vᵢ,₂+...+vᵢ,T).\n\nThe mechanical problem: y*ᵢ,ₜ₋₁ contains the raw term yᵢ,ₜ₋₁, and v*ᵢ,ₜ's average explicitly includes vᵢ,ₜ₋₁ (since t−1 falls within the averaging window 2 to T for most t). But yᵢ,ₜ₋₁ was itself generated by the same equation one period earlier — yᵢ,ₜ₋₁ = λyᵢ,ₜ₋₂ + ... + vᵢ,ₜ₋₁ — so yᵢ,ₜ₋₁ literally contains vᵢ,ₜ₋₁ as one of its components. Since v*ᵢ,ₜ's average subtracts vᵢ,ₜ₋₁ with a negative weight, and y*ᵢ,ₜ₋₁ carries yᵢ,ₜ₋₁ (which contains that same vᵢ,ₜ₋₁) directly, the two transformed terms end up correlated purely through this shared component — not because of any real relationship between today's shock and yesterday's lending growth, but because the demeaning operation was built from overlapping time-averages that share terms with each other. The same logic runs in reverse too: the −(1/(T−1))yᵢ,ₜ term inside y*ᵢ,ₜ₋₁'s own average is correlated with vᵢ,ₜ, since yᵢ,ₜ itself contains vᵢ,ₜ.\n\nThis is exactly the mechanism the Roodman (2009) example already in the thesis illustrates concretely: a firm's unmodeled negative shock in one period lowers both its estimated fixed effect (averaged into the bank's overall performance) and its lagged value in nearby periods, manufacturing a spurious correlation that has nothing to do with genuine persistence. Critically, this correlation doesn't shrink as N grows — only as T grows does the 1/(T−1) scaling shrink the contamination toward zero, which is why the bias is real and non-negligible with T≈24 quarters here, and why it requires a different fix (Arellano-Bond) rather than just more banks in the sample."

    "id": "Q59",
    "section": "Data & Identification",
    "q": "Equation (8) is the Arellano-Bond first-differenced specification. Walk through the actual instrument-building logic — why does a lagged level like yᵢ,₁ serve as a valid instrument for a differenced term like (yᵢ,₂ − yᵢ,₁)?",
    "risk": "this is the mechanical heart of the GMM apparatus, and \"the paper uses valid instruments\" is a much weaker answer than being able to say specifically which instrument goes with which term and why it's valid.",
    "notes": [],
    "answer": "Equation (8), (yᵢ,ₜ − yᵢ,ₜ₋₁) = λ(yᵢ,ₜ₋₁ − yᵢ,ₜ₋₂) + (X'ᵢ,ₜ₋₁ − X'ᵢ,ₜ₋₂)B + (uᵢ,ₜ − uᵢ,ₜ₋₁), comes from first-differencing equation (7) — differencing eliminates αᵢ entirely, since a bank's fixed effect doesn't change over time and cancels out. What's left is a differenced lagged dependent variable, Δyᵢ,ₜ₋₁ = yᵢ,ₜ₋₁ − yᵢ,ₜ₋₂, which is still endogenous: it contains yᵢ,ₜ₋₁, which was itself generated using uᵢ,ₜ₋₁, and that same uᵢ,ₜ₋₁ propagates into the differenced error at the prior step of the dynamic structure — so a valid instrument needs to correlate with the endogenous differenced term without correlating with the current differenced error.\n\nLagged *levels* solve this. Take t=3: the estimating equation involves Δyᵢ,₂ = yᵢ,₂ − yᵢ,₁ as the lagged-difference regressor needing an instrument. yᵢ,₁ is a valid candidate: it's clearly correlated with Δyᵢ,₂ (yᵢ,₁ is literally one of its two components), but — under the assumption that the original uᵢ,ₜ has no serial correlation — yᵢ,₁ was determined before uᵢ,₂ and uᵢ,₃ occurred, so it's uncorrelated with Δuᵢ,₃ = uᵢ,₃ − uᵢ,₂. That's exactly the paper's own example: \"yᵢ,1 as an instrument for (yᵢ,2 − yᵢ,1) for period 3.\"\n\nMove forward one period, to t=4: the regressor needing an instrument is now Δyᵢ,₃ = yᵢ,₃ − yᵢ,₂, and both yᵢ,₁ *and* yᵢ,₂ are valid instruments — any level dated two periods or more before the current one qualifies, and there are simply more of them available as t grows. That's the paper's second example, \"yᵢ,2 as an instrument for (yᵢ,3 − yᵢ,2) for period 4,\" and it's also precisely why instrument count grows mechanically with T: by the last period in the panel, every earlier level is a technically valid instrument — exactly the instrument-proliferation concern already flagged in Q29 and the Econometrics Refresher. More valid instruments isn't free: too many relative to N=8 banks risks overfitting the first stage and weakening the Sargan/Hansen tests' power to catch a real problem."

const SECTIONS = [...new Set(ITEMS.map(i => i.section))];
const PKEY = 'thesis_drill_v1';

window.state = {
  progress: {},
  view: 'dashboard',
  queue: [],
  queueIndex: 0,
  phase: 'answering',   // 'answering' | 'grading' | 'graded'
  userAnswer: '',
  aiResult: null,
  gradingFailed: false,
  sessionTally: { blanked: 0, shaky: 0, nailed: 0 },
  sectionPick: SECTIONS[0],
};

let _saveTimer = null, _savePending = false;

function defaultProgress(){
  return { shown:0, blanked:0, shaky:0, nailed:0, lastSeen:null, priority:50 };
}

async function loadProgress(){
  try{
    const r = await fetch('/api/update', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'progGet', key:PKEY }) });
    const j = await r.json();
    if (j && j.state) state.progress = j.state;
  } catch(e){
    state.progress = {};
  }
  for (const it of ITEMS){
    if (!state.progress[it.id]) state.progress[it.id] = defaultProgress();
  }
}

function doPersist(){
  return fetch('/api/update', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'progSave', key:PKEY, state: state.progress }) })
    .then(r => { if (r.ok) _savePending = false; })
    .catch(() => {});
}
function saveProgress(){
  _savePending = true;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(doPersist, 800);
}
function flushSave(){
  if (!_savePending) return;
  try{
    navigator.sendBeacon('/api/update', new Blob([JSON.stringify({ action:'progSave', key:PKEY, state: state.progress })], { type:'application/json' }));
    _savePending = false;
  } catch(e){}
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushSave(); });
window.addEventListener('pagehide', flushSave);

function classify(p){
  if (!p || p.shown===0) return 'unseen';
  if (p.priority<=20) return 'strong';
  if (p.priority<=55) return 'medium';
  return 'weak';
}

function computeWeight(item){
  const p = state.progress[item.id] || defaultProgress();
  const daysSince = p.lastSeen ? (Date.now()-p.lastSeen)/(1000*60*60*24) : 999;
  const decayBonus = Math.min(20, daysSince*2);
  return Math.max(1, p.priority + decayBonus);
}

function weightedSample(pool, n){
  const keyed = pool.map(item => ({ item, key: Math.pow(Math.random(), 1/computeWeight(item)) }));
  keyed.sort((a,b) => b.key - a.key);
  return keyed.slice(0, n).map(k => k.item);
}

function buildQueue(mode){
  let pool = ITEMS;
  if (mode === 'section') pool = ITEMS.filter(i => i.section === state.sectionPick);
  if (mode === 'weak') pool = ITEMS.filter(i => classify(state.progress[i.id]) === 'weak' || classify(state.progress[i.id]) === 'unseen');
  const n = mode === 'quick10' ? Math.min(10, pool.length) : pool.length;
  return weightedSample(pool, n);
}

function startSession(mode){
  const q = buildQueue(mode);
  if (q.length === 0){ return; }
  state.queue = q;
  state.queueIndex = 0;
  state.phase = 'answering';
  state.userAnswer = '';
  state.aiResult = null;
  state.gradingFailed = false;
  state.sessionTally = { blanked:0, shaky:0, nailed:0 };
  state.view = 'drill';
  render();
}

function resetItemState(){
  state.phase = 'answering';
  state.userAnswer = '';
  state.aiResult = null;
  state.gradingFailed = false;
}

async function gradeAnswer(item, userAnswer){
  const response = await fetch('/api/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'gradeThesis',
      question: item.q,
      risk: item.risk || '',
      reference: item.answer,
      notes: item.notes || [],
      studentAnswer: userAnswer,
    }),
  });
  const data = await response.json();
  if (!data || !data.result) throw new Error('No graded result returned');
  const parsed = data.result;
  if (!['nailed','shaky','blanked'].includes(parsed.rating)) throw new Error('Bad rating value');
  return parsed;
}

async function submitAnswer(){
  const ta = document.getElementById('answerInput');
  const val = ta ? ta.value.trim() : '';
  state.userAnswer = val;
  if (val === ''){ skipToAnswer(); return; }

  state.phase = 'grading';
  render();

  const item = state.queue[state.queueIndex];
  try{
    state.aiResult = await gradeAnswer(item, val);
    state.gradingFailed = false;
  } catch(e){
    console.error('Grading failed', e);
    state.aiResult = null;
    state.gradingFailed = true;
  }
  state.phase = 'graded';
  render();
}

function skipToAnswer(){
  state.aiResult = null;
  state.gradingFailed = false;
  state.phase = 'graded';
  render();
}

function rate(rating){
  const item = state.queue[state.queueIndex];
  const p = state.progress[item.id];
  p.shown++;
  p.lastSeen = Date.now();
  if (rating === 'blanked'){ p.blanked++; p.priority = Math.min(100, p.priority + 35); state.sessionTally.blanked++; }
  else if (rating === 'shaky'){ p.shaky++; p.priority = Math.min(100, p.priority + 12); state.sessionTally.shaky++; }
  else { p.nailed++; p.priority = Math.max(5, p.priority - 25); state.sessionTally.nailed++; }
  saveProgress();
  state.queueIndex++;
  resetItemState();
  if (state.queueIndex >= state.queue.length){ state.view = 'summary'; }
  render();
}

function endSession(){ state.view = 'summary'; render(); }
function goHome(){ state.view = 'dashboard'; render(); }

async function resetProgress(){
  if (!confirm("Reset all confidence tracking? This clears every rating you've recorded.")) return;
  state.progress = {};
  for (const it of ITEMS) state.progress[it.id] = defaultProgress();
  await doPersist();
  render();
}

// ---------- markdown-lite rendering ----------
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function inline(s){
  let t = escapeHtml(s);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return t;
}
function renderAnswerHtml(text){
  const blocks = text.split('\n\n').filter(b => b.trim() !== '');
  let html = '';
  let i = 0;
  while (i < blocks.length){
    if (/^-\s/.test(blocks[i])){
      html += '<ul>';
      while (i < blocks.length && /^-\s/.test(blocks[i])){
        html += '<li>' + inline(blocks[i].replace(/^-\s/, '')) + '</li>';
        i++;
      }
      html += '</ul>';
    } else {
      html += '<p>' + inline(blocks[i]) + '</p>';
      i++;
    }
  }
  return html;
}

// ---------- rendering ----------
function statCounts(){
  const c = { unseen:0, strong:0, medium:0, weak:0 };
  for (const it of ITEMS) c[classify(state.progress[it.id])]++;
  return c;
}
function portfolioSpread(){
  let sum = 0;
  for (const it of ITEMS) sum += (state.progress[it.id] || defaultProgress()).priority;
  return Math.round(sum / ITEMS.length);
}

function renderDashboard(){
  const c = statCounts();
  const spread = portfolioSpread();
  const sectionOptions = SECTIONS.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');

  let sectionRows = '';
  for (const sec of SECTIONS){
    const items = ITEMS.filter(i => i.section === sec);
    const cc = { unseen:0, strong:0, medium:0, weak:0 };
    for (const it of items) cc[classify(state.progress[it.id])]++;
    sectionRows += `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--rule); font-size:13px;">
        <span>${escapeHtml(sec)} <span style="color:var(--ink-secondary); font-family:'JetBrains Mono'; font-size:11px;">(${items.length})</span></span>
        <span style="font-family:'JetBrains Mono'; font-size:11px; color:var(--ink-secondary);">
          <span class="dot" style="background:var(--accent)"></span>${cc.strong}
          <span class="dot" style="background:var(--amber); margin-left:8px;"></span>${cc.medium}
          <span class="dot" style="background:var(--red); margin-left:8px;"></span>${cc.weak}
          <span class="dot" style="background:var(--ink-secondary); margin-left:8px;"></span>${cc.unseen}
        </span>
      </div>`;
  }

  document.getElementById('app').innerHTML = `
    <a class="backlink" href="index.html">← Board</a>
    <div class="eyebrow">External Funding &amp; the Bank-Lending Channel — Defence Prep</div>
    <h1 class="title">Drill Book</h1>
    <p class="subtitle">59 entries. Type your attempt cold, get graded against the reference answer, then confirm or override the rating yourself. Weak spots resurface more often.</p>

    <div class="card spread-hero">
      <div class="spread-row">
        <div>
          <div class="spread-number">${spread}<span class="spread-unit">bp</span></div>
          <div class="eyebrow" style="margin-top:2px;">portfolio confidence spread</div>
        </div>
        <div class="spread-label">0 = mastered across the board. 100 = everything still shaky. Narrows as you drill.</div>
      </div>
      <div class="spread-track"><div class="spread-marker" style="left:${spread}%;"></div></div>
      <div class="spread-ticks"><span>0 — tight</span><span>50</span><span>100 — wide</span></div>

      <div class="stat-grid">
        <div class="stat-cell"><div class="stat-num" style="color:var(--accent)">${c.strong}</div><div class="stat-lbl">Strong</div></div>
        <div class="stat-cell"><div class="stat-num" style="color:var(--amber)">${c.medium}</div><div class="stat-lbl">Medium</div></div>
        <div class="stat-cell"><div class="stat-num" style="color:var(--red)">${c.weak}</div><div class="stat-lbl">Weak</div></div>
        <div class="stat-cell"><div class="stat-num" style="color:var(--ink-secondary)">${c.unseen}</div><div class="stat-lbl">Unseen</div></div>
      </div>
    </div>

    <h2 class="section-h">Start a round</h2>
    <div class="mode-grid">
      <button class="mode-btn" onclick="startSession('quick10')">
        <div class="mb-title">Quick 10</div>
        <div class="mb-sub">Fast pass, weighted to weak spots</div>
      </button>
      <button class="mode-btn" onclick="startSession('weak')">
        <div class="mb-title">Weak Spots Only</div>
        <div class="mb-sub">Everything not yet solid</div>
      </button>
    </div>
    <div style="margin-top:10px;">
      <button class="full-btn" onclick="startSession('full')">Full Pass — all 59, weighted order</button>
    </div>

    <h2 class="section-h">By section</h2>
    <div class="card" style="padding:16px 18px;">
      <select class="section-select" id="sectionSelect" onchange="state.sectionPick=this.value">
        ${sectionOptions}
      </select>
      <button class="full-btn" onclick="startSession('section')">Drill this section</button>
      <div style="margin-top:14px;">${sectionRows}</div>
    </div>

    <h2 class="section-h">Reference</h2>
    <div class="card">
      <details class="patterns">
        <summary>Recurring patterns to self-check ▾</summary>
        <div class="pattern-item"><b>1. BB1988 vs BG1995.</b> Different papers, different jobs — don't conflate the original deposit-based channel with the general credit-channel framework.</div>
        <div class="pattern-item"><b>2. Restating vs. instantiating.</b> If asked for a concrete example, a more elaborate definition is not an example.</div>
        <div class="pattern-item"><b>3. Wrong-direction prediction.</b> Check which direction the paper's own evidence points before answering — don't guess from intuition.</div>
        <div class="pattern-item"><b>4. Overclaiming "directly tests."</b> Default to "consistent with" unless there's an actual test to point to.</div>
      </details>
    </div>

    <div class="sync-note">Synced to the Life OS board — progress follows you across devices.</div>
    <button class="reset-link" onclick="resetProgress()">Reset all progress</button>
  `;
  document.getElementById('sectionSelect').value = state.sectionPick;
}

function renderDrill(){
  const item = state.queue[state.queueIndex];

  let bodyHtml = '';

  if (state.phase === 'answering'){
    bodyHtml = `
      <div class="answer-label">Your attempt — write it as if you were saying it out loud</div>
      <textarea class="answer-input" id="answerInput" rows="6" placeholder="Type your answer here..."></textarea>
      <div class="answer-actions">
        <button class="full-btn" style="flex:1;" onclick="submitAnswer()">Submit for grading</button>
        <button class="skip-link" onclick="skipToAnswer()">Skip — just show me the answer</button>
      </div>
    `;
  } else if (state.phase === 'grading'){
    bodyHtml = `
      <div class="your-answer-box"><span class="ya-label">Your attempt</span>${inline(state.userAnswer)}</div>
      <div class="grading-indicator"><span class="grading-dot"></span>Grading against the reference answer…</div>
    `;
  } else {
    let verdictHtml = '';
    if (state.aiResult){
      const r = state.aiResult;
      verdictHtml = `
        <div class="your-answer-box"><span class="ya-label">Your attempt</span>${inline(state.userAnswer)}</div>
        <div class="verdict-box tier-${r.rating}">
          <div class="verdict-headline">${inline(r.verdict)}</div>
          <div class="verdict-feedback">${inline(r.feedback)}</div>
        </div>
      `;
    } else if (state.gradingFailed){
      verdictHtml = `
        <div class="your-answer-box"><span class="ya-label">Your attempt</span>${inline(state.userAnswer)}</div>
        <div class="note-box">Auto-grading unavailable right now — compare your attempt to the reference yourself and rate honestly below.</div>
      `;
    } else if (state.userAnswer){
      verdictHtml = `<div class="your-answer-box"><span class="ya-label">Your attempt</span>${inline(state.userAnswer)}</div>`;
    }

    const suggested = state.aiResult ? state.aiResult.rating : null;

    bodyHtml = `
      ${verdictHtml}
      <div class="answer-block">${renderAnswerHtml(item.answer)}</div>
      ${item.notes.map(n => `<div class="note-box">${inline(n)}</div>`).join('')}
      <div class="selfcheck">
        <b>Self-check:</b> Restated instead of instantiating? · Predicted the wrong direction? · Said "directly tests" without a test to point to? · Mixed up BB1988 / BG1995?
      </div>
      <div class="stamp-row">
        <button class="stamp blanked ${suggested==='blanked'?'ai-suggested':''}" onclick="rate('blanked')">Blanked</button>
        <button class="stamp shaky ${suggested==='shaky'?'ai-suggested':''}" onclick="rate('shaky')">Shaky</button>
        <button class="stamp nailed ${suggested==='nailed'?'ai-suggested':''}" onclick="rate('nailed')">Nailed it</button>
      </div>
      ${suggested ? `<div style="text-align:center; font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-tertiary); margin-top:8px;">ring = examiner's suggested rating — final call is yours</div>` : ''}
    `;
  }

  document.getElementById('app').innerHTML = `
    <div class="drill-top">
      <span class="progress-pill">Item ${state.queueIndex+1} / ${state.queue.length}</span>
      <button class="end-link" onclick="endSession()">End session</button>
    </div>
    <div class="card qcard">
      <span class="item-id">${item.id}</span><span class="item-section">${escapeHtml(item.section)}</span>
      <div class="qtext">${inline(item.q)}</div>
      ${item.risk ? `<div class="risk-box"><b>Why it's a risk:</b> ${inline(item.risk)}</div>` : ''}
      ${bodyHtml}
    </div>
  `;
}

function renderSummary(){
  const t = state.sessionTally;
  const total = t.blanked + t.shaky + t.nailed;
  const spread = portfolioSpread();
  document.getElementById('app').innerHTML = `
    <a class="backlink" href="index.html">← Board</a>
    <div class="eyebrow">Session complete</div>
    <h1 class="title">${total} reviewed</h1>
    <p class="subtitle">Updated portfolio spread: <b style="color:var(--ink)">${spread}bp</b></p>
    <div class="summary-tally">
      <div class="tally-cell"><div class="tally-num" style="color:var(--red)">${t.blanked}</div><div class="tally-lbl">Blanked</div></div>
      <div class="tally-cell"><div class="tally-num" style="color:var(--amber)">${t.shaky}</div><div class="tally-lbl">Shaky</div></div>
      <div class="tally-cell"><div class="tally-num" style="color:var(--accent)">${t.nailed}</div><div class="tally-lbl">Nailed</div></div>
    </div>
    <button class="full-btn" onclick="goHome()">Back to dashboard</button>
  `;
}

function render(){
  if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'drill') renderDrill();
  else if (state.view === 'summary') renderSummary();
}

(async function init(){
  await loadProgress();
  render();
})();
</script>
</body>
</html>
