<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Update</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2eb;--bg2:#edeae1;
  --ink:#1a1814;--ink2:#3a3730;--ink3:#8a877e;--ink4:#b8b4aa;
  --accent:#2d5a3d;--accent-light:#e4ede6;
  --warn:#8b3a1a;
  --rule:#d4cfc4;--rule2:#c4bfb4;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141210;--bg2:#1c1a17;
    --ink:#f0ece3;--ink2:#d0ccc3;--ink3:#6e6a62;--ink4:#3e3b35;
    --accent:#6aaa7e;--accent-light:#1a2e1f;
    --warn:#d4784a;
    --rule:#2e2b24;--rule2:#3a3730;
  }
}
html{font-size:16px}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1.25rem}
.container{width:100%;max-width:560px}
.header{margin-bottom:2rem}
.header h1{font-family:var(--serif);font-size:1.8rem;font-weight:400;font-style:italic;color:var(--ink);line-height:1}
.header p{font-size:0.72rem;color:var(--ink3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.4rem}
.label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.5rem;display:block}
textarea,input[type=text],input[type=password]{width:100%;background:var(--bg2);border:1px solid var(--rule2);border-radius:3px;padding:0.85rem 1rem;font-family:var(--mono);font-size:0.85rem;font-weight:300;color:var(--ink);outline:none;transition:border-color 0.15s;line-height:1.6}
textarea{min-height:160px;resize:vertical}
textarea:focus,input:focus{border-color:var(--accent)}
textarea::placeholder,input::placeholder{color:var(--ink4)}
.field{margin-bottom:1.25rem}
.submit-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:1.25rem}
.btn{font-family:var(--mono);font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--accent);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:3px;cursor:pointer;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:default}
.btn-secondary{background:transparent;color:var(--ink3);border:1px solid var(--rule2)}
.btn-secondary:hover{opacity:1;border-color:var(--ink3);color:var(--ink2)}
.status{font-size:0.75rem;color:var(--ink3);line-height:1.5}
.status.error{color:var(--warn)}
.status.success{color:var(--accent)}
.divider{border:none;border-top:1px solid var(--rule);margin:2rem 0}
.notion-link{font-size:0.78rem;color:var(--accent);text-decoration:none}
.notion-link:hover{text-decoration:underline}
.setup-box{background:var(--bg2);border:1px solid var(--rule2);border-radius:3px;padding:1.25rem;margin-bottom:2rem}
.setup-title{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--warn);margin-bottom:0.75rem}
.setup-note{font-size:0.72rem;color:var(--ink3);margin-top:0.6rem;line-height:1.6}
.settings-toggle{font-size:0.68rem;color:var(--ink3);cursor:pointer;letter-spacing:0.06em;text-decoration:underline;display:inline-block;margin-top:0.5rem}
.settings-toggle:hover{color:var(--ink2)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Dashboard update</h1>
    <p>Jonas Vannerfors · Life OS</p>
  </div>

  <!-- Setup panel (shown only if token not saved) -->
  <div class="setup-box" id="setup-box">
    <div class="setup-title">One-time setup — enter your credentials</div>
    <div class="field">
      <label class="label" for="token-input">Notion API token</label>
      <input type="password" id="token-input" placeholder="ntn_xxxxxxxx...">
    </div>
    <div class="field">
      <label class="label" for="pageid-input">Notion page ID</label>
      <input type="text" id="pageid-input" placeholder="36e5601c895f80ec...">
    </div>
    <button class="btn" onclick="saveCredentials()">Save credentials</button>
    <div class="setup-note">Saved in your browser only — never sent anywhere except Notion directly.</div>
  </div>

  <!-- Main form (shown once credentials saved) -->
  <div id="main-form" style="display:none">
    <div class="field">
      <label class="label" for="dump">Brain dump — messy thoughts, anything</label>
      <textarea id="dump" placeholder="e.g. need to call HR tomorrow, found a good house on hemnet, coffee with karin next week, worried about mortgage timing..."></textarea>
    </div>
    <div class="field">
      <label class="label" for="done">Done since last update (optional)</label>
      <textarea id="done" style="min-height:80px" placeholder="e.g. contacted HR, packed one box..."></textarea>
    </div>
    <div class="submit-row">
      <button class="btn" id="submit-btn" onclick="runUpdate()">Update dashboard →</button>
      <span class="status" id="status"></span>
    </div>

    <hr class="divider">
    <a class="notion-link" href="https://www.notion.so/36e5601c895f80ecab3bf02e35265c10" target="_blank">→ Open dashboard in Notion</a>
    <br>
    <span class="settings-toggle" onclick="showSetup()">Edit credentials</span>
  </div>
</div>

<script>
const NOTION_PAGE_ID_DEFAULT = '36e5601c895f80ecab3bf02e35265c10';

const CURRENT_DASHBOARD = `WEEKLY FOCUS
Shift from work mode to transition mode
Resolve employment, mortgage and financial implications
Activate career options through simple outreach
Keep move and life admin moving without overload
Protect bandwidth during uncertainty

TRANSITION
NOW
- Contact HR re: mortgage benefit / reduced rate implications
- Get new private phone number + transfer accounts from work number
- Update abonnemang tied to old number
- Follow up master's materials: thesis, presentation, archive
- Save SRC materials
NEXT
- Clarify financial runway and housing implications
- Map realistic career directions
- Decide near-term job search posture
LATER
- Longer-term repositioning
- Start företag (park until transition clearer)

MASTER THESIS — Bank Lending Channel · Submission Aug 19 · Seminar Aug 28
NOW
- Half-day data recon — audit Riksbanken + SCB stats, assess Path B feasibility
- Workshop thesis positioning — resolve framing tension between dated dataset and resubmission
- Read thesis end-to-end, annotate against 2026 grading criteria → prioritised gap list
- Map GMM instrument validity issues — what needs fixing vs better argumentation
NEXT
- Methodological fixes: re-run GMM with corrected instruments
- Rewrite limitations section — explicit and confident, not defensive
- Near-banks result: reframe as honest inconclusive finding
- Literature review + narrative update — refresh framing without touching dataset
- Full rewrite pass for argumentation tightness
LATER
- Polish pass — abstract, introduction, conclusion alignment
- Seminar prep — anticipate examiner questions
- Submit Aug 19 · Seminar Aug 28

MOVE
NOW
- Start packing → fill 1 box
NEXT
- Research storage options
- Plan plant relocation (buy pots)
- Outline move logistics
- Finalize deductions / documentation
LATER
- Execute move plan

BUYING / HOUSING
NOW
- Open Excel → add 5 houses
NEXT
- Apply for lånelöfte
- Track listings weekly
- Clarify mortgage conditions after employment change
LATER
- Explore land + build
- Contact Värmdö kommun
- Deeper house-buying analysis

LIFE / SOCIAL / ENERGY
NOW
- Wash camper vans
- Update phone number in WhatsApp groups + key services
- Resolve Sam gift + food plan
- Rensa Gmail
NEXT
- Text Karin → quick check-in
- Decide re: Kristian's disputation
- Coffee with Kristian
- Coffee with Karin
LATER
- Klippklätterkurs Lofoten? (park)

CAREER / EDUCATION
NOW
- Message 2 people → propose coffee / career conversation
- Open LinkedIn → shortlist 5 relevant roles or organisations
- Check Swedfund, Accenture, Systemiq roles
NEXT
- Draw on network: Kristian, Karin, Josef, Shruti, PA
- Explore study paths: economic history, anthropology, systems theory, AI
- Revisit nature agenda compendium angle
- Explore public, advisory and transition roles
LATER
- Positioning / direction
- Skill development: non-defensiveness + negotiation

READING / THINKING
NOW
- Read 2-3 pages: Panarchy (optional)
NEXT
- Skim Global Risks Report
- Learn: FTP / treasury profit logic
- Read Resilience Thinking
LATER
- Scaling rewilding projects
- The Resilience Company
- Substack: resilience as corporate strategic imperative

AI / TECH PROJECTS
NOW
- Housing pipeline project (define scope)
NEXT
- Learn from YouTube + network
LATER
- FF Tactics (park)
- Broader AI exploration

PARKING LOT
Long-form strategic thinking · Full job market mapping · Deep academic exploration · Dynamic life OS · Substack · Företag`;

function getCredentials() {
  return {
    token: localStorage.getItem('notion_token'),
    pageId: localStorage.getItem('notion_page_id') || NOTION_PAGE_ID_DEFAULT
  };
}

function saveCredentials() {
  const token = document.getElementById('token-input').value.trim();
  const pageId = document.getElementById('pageid-input').value.trim() || NOTION_PAGE_ID_DEFAULT;
  if (!token) { alert('Please enter your Notion token.'); return; }
  localStorage.setItem('notion_token', token);
  localStorage.setItem('notion_page_id', pageId);
  showMainForm();
}

function showMainForm() {
  document.getElementById('setup-box').style.display = 'none';
  document.getElementById('main-form').style.display = 'block';
}

function showSetup() {
  const creds = getCredentials();
  document.getElementById('token-input').value = creds.token || '';
  document.getElementById('pageid-input').value = creds.pageId || '';
  document.getElementById('setup-box').style.display = 'block';
  document.getElementById('main-form').style.display = 'none';
}

// On load — check if credentials exist
window.addEventListener('load', () => {
  const creds = getCredentials();
  if (creds.token) {
    showMainForm();
  }
});

async function callClaude(dump, done) {
  const doneSection = done.trim() ? `\nCompleted since last update:\n${done.trim()}\n` : '';
  const prompt = `You are maintaining a simple life dashboard for Jonas.

Here is the current dashboard:
${CURRENT_DASHBOARD}
${doneSection}
New thoughts (messy, unstructured — treat as inbox capture, not prompts for reinterpretation):
${dump.trim()}

Update the dashboard. Rules:
- Remove completed items (listed above as done)
- Integrate new thoughts into the right domain and tier (NOW/NEXT/LATER)
- Keep NOW short and actionable — only things realistic this week
- Preserve existing items unless clearly stale or completed
- Avoid duplication
- Keep wording as verbs + concrete next actions
- If something doesn't clearly fit, add it to LATER or Parking Lot
- Return ONLY the updated dashboard text, no commentary, no markdown, no backticks
- Use this exact structure for each domain:

DOMAIN NAME
NOW
- item
NEXT
- item
LATER
- item

Start with WEEKLY FOCUS, then each domain, then PARKING LOT at the end.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) throw new Error(`Claude API error: ${response.status}`);
  const data = await response.json();
  return data.content[0].text;
}

async function clearNotionPage(token, pageId) {
  const res = await fetch(`https://api.notion.com/v1/blocks/${pageId}/children`, {
    headers: { 'Authorization': `Bearer ${token}`, 'Notion-Version': '2022-06-28' }
  });
  if (!res.ok) throw new Error(`Notion read error: ${res.status}`);
  const data = await res.json();
  for (const block of data.results) {
    await fetch(`https://api.notion.com/v1/blocks/${block.id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}`, 'Notion-Version': '2022-06-28' }
    });
  }
}

function dashboardToBlocks(text) {
  const lines = text.split('\n');
  const blocks = [];
  const tierLabels = ['NOW', 'NEXT', 'LATER', 'PARKING LOT'];

  blocks.push({
    object: 'block', type: 'paragraph',
    paragraph: { rich_text: [{ type: 'text', text: { content: `Updated: ${new Date().toLocaleDateString('sv-SE', {weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'})}` }, annotations: { color: 'gray' } }] }
  });
  blocks.push({ object: 'block', type: 'divider', divider: {} });

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { blocks.push({ object: 'block', type: 'paragraph', paragraph: { rich_text: [] } }); continue; }

    if (tierLabels.includes(line)) {
      blocks.push({ object: 'block', type: 'heading_3', heading_3: { rich_text: [{ type: 'text', text: { content: line } }] } });
    } else if (line === line.toUpperCase() && !line.startsWith('-') && !line.startsWith('→') && line.length > 2) {
      blocks.push({ object: 'block', type: 'heading_2', heading_2: { rich_text: [{ type: 'text', text: { content: line } }] } });
    } else if (line.startsWith('- ') || line.startsWith('→ ')) {
      const content = line.replace(/^[-→]\s+/, '');
      blocks.push({ object: 'block', type: 'bulleted_list_item', bulleted_list_item: { rich_text: [{ type: 'text', text: { content } }] } });
    } else {
      blocks.push({ object: 'block', type: 'paragraph', paragraph: { rich_text: [{ type: 'text', text: { content: line } }] } });
    }
  }
  return blocks;
}

async function writeToNotion(text, token, pageId) {
  const blocks = dashboardToBlocks(text);
  for (let i = 0; i < blocks.length; i += 100) {
    const chunk = blocks.slice(i, i + 100);
    const res = await fetch(`https://api.notion.com/v1/blocks/${pageId}/children`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ children: chunk })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(`Notion write error: ${JSON.stringify(err)}`); }
  }
}

async function runUpdate() {
  const dump = document.getElementById('dump').value.trim();
  const done = document.getElementById('done').value.trim();
  if (!dump && !done) { setStatus('Add some thoughts first.', 'error'); return; }

  const creds = getCredentials();
  if (!creds.token) { showSetup(); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  setStatus('Calling Claude...', '');

  try {
    const updated = await callClaude(dump || '(no new thoughts)', done);
    setStatus('Writing to Notion...', '');
    await clearNotionPage(creds.token, creds.pageId);
    await writeToNotion(updated, creds.token, creds.pageId);
    document.getElementById('dump').value = '';
    document.getElementById('done').value = '';
    setStatus('Done ✓ Dashboard updated in Notion', 'success');
  } catch(err) {
    console.error(err);
    setStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' '+type : '');
}
</script>
</body>
</html>
